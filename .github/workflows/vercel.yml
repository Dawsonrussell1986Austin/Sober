name: Deploy to Vercel

# Deploys the web app to Vercel on every push to main.
#
# ONE-TIME SETUP (required before this can run):
#   1. Create a Vercel token: https://vercel.com/account/settings/tokens
#   2. In this repo: Settings -> Secrets and variables -> Actions -> New repository secret
#        Name:  VERCEL_TOKEN
#        Value: <the token>
#   3. Push to main (or use "Run workflow" on the Actions tab).
#
# On the first run, the Vercel CLI auto-creates a project (named "sober") under
# your token's account and prints the live URL. Every later push redeploys it.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          URL=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")
          echo "Deployed to: $URL"
          echo "## ✅ Sober is live" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**$URL**" >> "$GITHUB_STEP_SUMMARY"
