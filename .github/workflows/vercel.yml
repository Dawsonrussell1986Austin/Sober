name: Deploy to Vercel

# Deploys the web app to Vercel.
#
# Token resolution order:
#   1. The "vercel_token" input (passed when manually dispatching this workflow).
#   2. The VERCEL_TOKEN repository secret (recommended for ongoing auto-deploys:
#      Settings -> Secrets and variables -> Actions -> New repository secret).
#
# On the first run, the Vercel CLI auto-creates a project (named "sober") under
# the "dawson-russell" account and prints the live URL. Every later push to main
# redeploys it (once VERCEL_TOKEN is saved as a secret).
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      vercel_token:
        description: "Vercel token (one-time; leave blank to use the VERCEL_TOKEN secret)"
        required: false
        default: ""

# Vercel account/team slug to deploy under (from vercel.com/<slug>).
env:
  VERCEL_SCOPE: dawson-russell

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          INPUT_TOKEN: ${{ github.event.inputs.vercel_token }}
          SECRET_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          TOKEN="${INPUT_TOKEN:-$SECRET_TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::No Vercel token. Dispatch with the vercel_token input, or set the VERCEL_TOKEN secret."
            exit 1
          fi
          # Mask the token so it can never surface in logs.
          echo "::add-mask::$TOKEN"
          URL=$(vercel deploy --prod --yes --scope="$VERCEL_SCOPE" --token="$TOKEN")
          echo "Deployed to: $URL"
          {
            echo "## ✅ Sober is live"
            echo ""
            echo "**$URL**"
          } >> "$GITHUB_STEP_SUMMARY"
